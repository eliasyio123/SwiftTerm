name: Build Xterm IPA

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout SwiftTerm
        uses: actions/checkout@v4
        with:
          repository: migueldeicaza/SwiftTerm
          submodules: recursive
      
      - name: Build IPA
        run: |
          # Build archive without signing
          xcodebuild archive \
            -project TerminalApp/iOSTerminal.xcodeproj \
            -scheme iOSTerminal \
            -configuration Release \
            -archivePath build/xterm.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          # Create unsigned IPA
          mkdir -p Payload
          cp -r build/xterm.xcarchive/Products/Applications/iOSTerminal.app Payload/
          zip -r Xterm.ipa Payload/
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: xterm-ipa
          path: Xterm.ipa
