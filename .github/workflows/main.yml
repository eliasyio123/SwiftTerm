name: Build Xterm IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout SwiftTerm
        uses: actions/checkout@v4
        with:
          repository: migueldeicaza/SwiftTerm
          submodules: recursive
      
      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app
          xcodebuild -version
      
      - name: Override Package.swift for compatibility
        run: |
          # Fix swift-nio-ssh version constraint
          sed -i '' 's/from: "0.12.0"/exact: "0.12.0"/g' Package.swift
          
          # Show the change
          cat Package.swift | grep -A 2 -B 2 "swift-nio-ssh"
      
      - name: Force dependency resolution
        run: |
          cd TerminalApp
          
          # Clean package cache
          rm -rf ~/Library/Developer/Xcode/DerivedData/SourcePackages
          rm -rf ~/Library/Developer/Xcode/DerivedData/SwiftTerm-*
          
          # Resolve with explicit versions
          xcodebuild -resolvePackageDependencies \
            -project iOSTerminal.xcodeproj \
            -scheme iOSTerminal \
            -clonedSourcePackagesDirPath ~/Library/Developer/Xcode/DerivedData/SourcePackages \
            -usePackageSupportBuiltin
      
      - name: Build IPA
        run: |
          xcodebuild archive \
            -project TerminalApp/iOSTerminal.xcodeproj \
            -scheme iOSTerminal \
            -configuration Release \
            -archivePath build/xterm.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -clonedSourcePackagesDirPath ~/Library/Developer/Xcode/DerivedData/SourcePackages \
            -skipPackagePluginValidation \
            -usePackageSupportBuiltin
          
          # Create IPA
          mkdir -p Payload
          cp -R build/xterm.xcarchive/Products/Applications/iOSTerminal.app Payload/
          zip -r Xterm.ipa Payload/
      
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: xterm-ipa
          path: Xterm.ipa
