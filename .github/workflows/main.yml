name: Build from Working Fork

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout working fork
        uses: actions/checkout@v4
        with:
          repository: karwa/SwiftTerm  # This fork has fixed dependencies
          submodules: recursive
          ref: main
      
      - name: Build
        run: |
          xcodebuild archive \
            -project TerminalApp/iOSTerminal.xcodeproj \
            -scheme iOSTerminal \
            -configuration Release \
            -archivePath build/xterm.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
          
          mkdir -p Payload
          cp -R build/xterm.xcarchive/Products/Applications/iOSTerminal.app Payload/
          zip -r Xterm.ipa Payload/
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: xterm-ipa
          path: Xterm.ipa
